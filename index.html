<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ratio">
<meta name="theme-color" content="#0a0b0d">
<title>Office Ratio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&display=swap');
:root{
  --bg:#0a0b0d; --panel:#13161c; --line:rgba(255,255,255,0.09);
  --text:#edebe4; --muted:#9aa0ac; --accent:#c6f24e; --warn:#ff6a55; --amber:#f5b54a; --off:#5b6b8c;
  --font:'Atkinson Hyperlegible',system-ui,sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font);font-size:16px;line-height:1.5;-webkit-text-size-adjust:100%;}
body{padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);}
.num{font-variant-numeric:tabular-nums;letter-spacing:.01em;}
.wrap{max-width:980px;margin:0 auto;padding:28px 16px 90px;}
button{font-family:var(--font);cursor:pointer;}
input{font-family:var(--font);font-size:15px;}
input::placeholder{color:rgba(255,255,255,0.28);}
input[type=time]{color-scheme:dark;}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;}
.lbl{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:700;}
.sub{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;font-weight:700;}
.inp{font-size:15px;padding:7px 9px;border-radius:8px;border:1px solid var(--line);background:rgba(255,255,255,0.04);color:var(--text);outline:none;}
header{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:22px;}
h1{font-size:30px;font-weight:700;margin:2px 0 0;letter-spacing:-.01em;}
.kicker{font-size:12px;letter-spacing:.18em;color:var(--accent);text-transform:uppercase;font-weight:700;}
.navbtn{font-size:18px;background:none;border:1px solid var(--line);border-radius:9px;color:var(--muted);width:38px;height:38px;line-height:1;}
.navbtn:hover{color:var(--text);border-color:var(--accent);}
.chip{font-size:13px;padding:6px 11px;border-radius:9px;border:1px solid var(--line);background:transparent;color:var(--muted);}
.chip.on{border-color:var(--accent);background:rgba(198,242,78,.1);color:var(--text);}
.grid2{display:grid;grid-template-columns:1fr;gap:16px;}
@media(min-width:760px){.grid2{grid-template-columns:1fr 1fr;}}
.metric{font-weight:700;line-height:1;}
.bar{position:absolute;inset:0;opacity:.85;transition:width .4s;}
.ghost{background:none;border:1px solid var(--line);border-radius:8px;color:var(--muted);font-size:13px;padding:7px 12px;}
.ghost:hover{color:var(--text);}
.hidden{display:none;}
/* day rows */
.day{display:flex;align-items:center;gap:8px;padding:8px;border-radius:10px;flex-wrap:wrap;border:1px solid transparent;}
.day:hover{background:rgba(255,255,255,0.025);}
.day.hol{background:rgba(91,107,140,.10);}
.daydate{width:96px;font-weight:700;}
.daydate small{display:block;font-weight:400;color:var(--muted);font-size:12px;}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;}
.seg button{font-size:13px;font-weight:700;padding:7px 12px;border:none;background:transparent;color:var(--muted);border-right:1px solid var(--line);}
.seg button:last-child{border-right:none;}
.seg button.on-home{background:rgba(255,255,255,.12);color:var(--text);}
.seg button.on-office{background:rgba(198,242,78,.16);color:var(--accent);}
.seg button.on-off{background:rgba(91,107,140,.25);color:#aeb9d4;}
.holbadge{font-size:12px;color:#aeb9d4;background:rgba(91,107,140,.18);padding:3px 8px;border-radius:6px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="kicker">Presence Control</div>
      <h1>Office&nbsp;Ratio</h1>
    </div>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
      <button class="navbtn" id="prev">‹</button>
      <div id="monthlabel" class="num" style="min-width:104px;text-align:center;font-size:15px;font-weight:700;"></div>
      <button class="navbtn" id="next">›</button>
      <div id="chips" style="display:flex;gap:6px;flex-wrap:wrap;margin-left:6px;"></div>
    </div>
  </header>

  <div id="status" class="panel" style="padding:24px;margin-bottom:16px;"></div>

  <div class="grid2">
    <div id="rolling" class="panel" style="padding:20px 22px;"></div>
    <div class="panel" style="padding:20px 22px;">
      <div class="lbl">Daily exit calculator</div>
      <div style="display:flex;gap:18px;margin-top:14px;flex-wrap:wrap;">
        <div>
          <div class="sub">clock in</div>
          <input id="calcIn" class="inp num" style="width:90px;" value="08:30" placeholder="08:30">
        </div>
        <div style="flex:1;min-width:150px;">
          <div class="sub">leave window</div>
          <div id="calcWin" class="num" style="font-size:16px;margin-top:7px;line-height:1.6;color:var(--muted);">—</div>
        </div>
      </div>
      <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--line);display:flex;gap:16px;flex-wrap:wrap;">
        <div>
          <div class="sub">if I leave at</div>
          <input id="calcOut" class="inp num" style="width:90px;" placeholder="17:30">
        </div>
        <div>
          <div class="sub">work / overtime</div>
          <div id="calcWork" class="num" style="font-size:18px;margin-top:4px;color:var(--muted);">—</div>
        </div>
      </div>
      <div style="font-size:12px;color:var(--muted);margin-top:12px;">30-min break auto-deducted &gt; 6h. OT = work above 7:42 (negative if below).</div>
    </div>
  </div>

  <div class="panel" style="padding:20px 22px;margin-top:16px;">
    <div style="display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px;">
      <div class="lbl" id="logtitle">Days</div>
      <div class="sub" style="margin:0;">tap a state · enter hours as h:mm</div>
    </div>
    <div id="loglist" style="margin-top:14px;display:flex;flex-direction:column;gap:3px;"></div>
  </div>

  <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:16px;flex-wrap:wrap;">
    <button class="ghost" id="export">export backup</button>
    <button class="ghost" id="importBtn">import backup</button>
    <button class="ghost" id="reset">reset to imported data</button>
    <input type="file" id="importFile" accept="application/json" class="hidden">
    <a id="dl" class="hidden"></a>
  </div>
</div>

<script>
const REQ=462, MAXW=600, BREAK=30, BRK_TH=360, TARGET=0.5, OT_TARGET=1500, KEY='presence_days_v2';
const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const WD=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

const SEED=[];

const pad=n=>String(n).padStart(2,"0");
const fmt=m=>{const s=m<0?"-":"";m=Math.abs(Math.round(m));return s+Math.floor(m/60)+":"+pad(m%60);};
const parseHM=s=>{if(!s)return null;s=String(s).trim();if(s.includes(":")){const[h,mm]=s.split(":");const H=parseInt(h,10),M=parseInt(mm||"0",10);if(isNaN(H)||isNaN(M))return null;return H*60+M;}const f=parseFloat(s);return isNaN(f)?null:Math.round(f*60);};
const mk=d=>d.slice(0,7);
const esc=s=>(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const iso=(y,m,d)=>y+"-"+pad(m)+"-"+pad(d);

// ---- Austrian bank holidays (Feiertage) for any year ----
function easter(y){
  const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),
  g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,
  mo=Math.floor((a+11*h+22*l)/451),mon=Math.floor((h+l-7*mo+114)/31),day=((h+l-7*mo+114)%31)+1;
  return new Date(y,mon-1,day);
}
function addDays(dt,n){const x=new Date(dt);x.setDate(x.getDate()+n);return x;}
function holidays(y){
  const H={};
  const fix=[[1,1,"Neujahr"],[1,6,"Hl. Drei Könige"],[5,1,"Staatsfeiertag"],[8,15,"Mariä Himmelfahrt"],
    [10,26,"Nationalfeiertag"],[11,1,"Allerheiligen"],[12,8,"Mariä Empfängnis"],[12,25,"Christtag"],[12,26,"Stefanitag"]];
  fix.forEach(([m,d,n])=>H[iso(y,m,d)]=n);
  const e=easter(y);
  const mov=[[1,"Ostermontag"],[39,"Christi Himmelfahrt"],[50,"Pfingstmontag"],[60,"Fronleichnam"]];
  mov.forEach(([off,n])=>{const dt=addDays(e,off);H[iso(dt.getFullYear(),dt.getMonth()+1,dt.getDate())]=n;});
  return H;
}

let days, sel;
function load(){try{const r=localStorage.getItem(KEY);days=r?JSON.parse(r):SEED.slice();}catch(e){days=SEED.slice();}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(days));}catch(e){}}
function getDay(date){return days.find(x=>x.date===date);}
function setDay(date,patch){
  let d=getDay(date);
  if(!d){d={date,type:"unset",minutes:0,note:""};days.push(d);}
  Object.assign(d,patch);
  if((d.type==="home"||d.type==="office")&&!d.minutes)d.minutes=REQ;
  save();render();
}

function monthData(k){
  let office=0,home=0,od=0,hd=0,off=0,ot=0;
  for(const d of days){
    if(mk(d.date)!==k)continue;
    if(d.type==="office"){office+=d.minutes;od++;ot+=d.minutes-REQ;}
    else if(d.type==="home"){home+=d.minutes;hd++;ot+=d.minutes-REQ;}
    else if(d.type==="off"){off++;}
  }
  const total=office+home;
  return{office,home,od,hd,off,total,ot,ratio:total?office/total:0,n:od+hd};
}
function monthsWithData(){return[...new Set(days.filter(d=>d.type==="home"||d.type==="office").map(d=>mk(d.date)))].sort();}
function shiftMonth(k,delta){let[y,m]=k.split("-").map(Number);m+=delta;while(m<1){m+=12;y--;}while(m>12){m-=12;y++;}return y+"-"+pad(m);}

function render(){
  document.getElementById("monthlabel").textContent=MONTHS[+sel.slice(5)-1]+" "+sel.slice(0,4);
  renderChips();renderStatus();renderRolling();renderDays();
}
function renderChips(){
  const wm=monthsWithData();
  document.getElementById("chips").innerHTML=wm.map(k=>{
    const r=monthData(k).ratio,on=k===sel;
    return `<button class="chip ${on?"on":""}" data-month="${k}">${MONTHS[+k.slice(5)-1]}<span class="num" style="margin-left:6px;color:${r>=TARGET?"var(--accent)":"var(--warn)"}">${(r*100).toFixed(0)}</span></button>`;
  }).join("");
}
function renderStatus(){
  const m=monthData(sel),over=m.ratio>=TARGET,otOver=m.ot>=OT_TARGET;
  const ratioGap=m.home-m.office,homeSlack=Math.floor((m.office-m.home)/REQ),otGap=OT_TARGET-m.ot;
  const capForRatio=ratioGap>0?Math.ceil(ratioGap/MAXW):0,capForOT=otGap>0?Math.ceil(otGap/(MAXW-REQ)):0;
  const combined=Math.max(capForRatio,capForOT);
  let ratioLine=ratioGap>0
    ? `<span style="color:var(--warn)">Office ratio under 50%.</span> Need <b class="num">${fmt(ratioGap)}</b> more office hrs — about <b class="num">${capForRatio}</b> office day${capForRatio!==1?"s":""} at 10:00.`
    : `<span style="color:var(--accent)">Office ratio clear.</span> Slack for <b class="num">${homeSlack}</b> more home day${homeSlack!==1?"s":""} at the 7:42 floor.`;
  let otLine=otGap>0
    ? `<span style="color:var(--warn)">Overtime <b class="num">${fmt(m.ot)}</b> / 25:00.</span> <b class="num">${fmt(otGap)}</b> short — about <b class="num">${capForOT}</b> office day${capForOT!==1?"s":""} at 10:00 (~2:18 OT each).`
    : `<span style="color:var(--accent)">Overtime target met</span> — <b class="num">${fmt(m.ot)}</b> / 25:00.`;
  let combinedLine=(ratioGap>0||otGap>0)
    ? `<div style="margin-top:12px;font-size:14px;">→ Add about <b style="color:var(--accent)">${combined}</b> office day${combined!==1?"s":""} at the 10:00 cap to clear both.</div>`
    : `<div style="margin-top:12px;font-size:14px;color:var(--accent)">→ Both targets satisfied.</div>`;
  document.getElementById("status").innerHTML=`
    <div style="display:grid;grid-template-columns:1fr;gap:20px;">
      <div>
        <div class="lbl">${MONTHS[+sel.slice(5)-1]} ${sel.slice(0,4)} · office share of work hours</div>
        <div style="display:flex;align-items:baseline;gap:12px;margin-top:6px;">
          <span class="metric num" style="font-size:54px;color:${over?"var(--accent)":"var(--warn)"}">${(m.ratio*100).toFixed(1)}<span style="font-size:22px;color:var(--muted)">%</span></span>
          <span class="num" style="font-size:14px;color:${over?"var(--accent)":"var(--warn)"}">${over?"+"+((m.ratio-TARGET)*100).toFixed(1)+" over":((TARGET-m.ratio)*100).toFixed(1)+" under"}</span>
        </div>
      </div>
      <div>
        <div class="lbl">overtime this month</div>
        <div style="display:flex;align-items:baseline;gap:12px;margin-top:6px;">
          <span class="metric num" style="font-size:54px;color:${otOver?"var(--accent)":"var(--amber)"}">${fmt(m.ot)}</span>
          <span class="num" style="font-size:14px;color:var(--muted)">/ 25:00 target</span>
        </div>
      </div>
    </div>
    <div style="margin-top:18px;position:relative;height:14px;border-radius:7px;background:rgba(255,255,255,0.06);overflow:hidden;">
      <div class="bar" style="width:${Math.min(m.ratio*100,100)}%;background:${over?"var(--accent)":"var(--warn)"}"></div>
    </div>
    <div style="position:relative;height:0;"><div class="num" style="position:absolute;left:50%;top:-15px;transform:translateX(-50%);font-size:11px;color:var(--muted)">▲ 50%</div></div>
    <div class="num" style="margin-top:22px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;font-size:14px;color:var(--muted)">
      <span>office <b style="color:var(--text)">${fmt(m.office)}</b> · ${m.od}d</span>
      <span>home <b style="color:var(--text)">${fmt(m.home)}</b> · ${m.hd}d</span>
      <span>off <b style="color:var(--text)">${m.off}d</b></span>
      <span>total <b style="color:var(--text)">${fmt(m.total)}</b></span>
    </div>
    <div style="margin-top:18px;padding-top:16px;border-top:1px solid var(--line);font-size:15px;line-height:1.6;">
      <div>${ratioLine}</div><div style="margin-top:6px;">${otLine}</div>${combinedLine}
    </div>`;
}
function renderRolling(){
  const wm=monthsWithData();
  const max=Math.max(0.6,...wm.map(k=>monthData(k).ratio));
  let tO=0,tT=0;wm.forEach(k=>{const d=monthData(k);tO+=d.office;tT+=d.total;});
  const ytd=tT?tO/tT:0;
  const bars=wm.map(k=>{
    const r=monthData(k).ratio,ok=r>=TARGET,h=(r/max)*100;
    return `<div data-month="${k}" style="flex:1;display:flex;flex-direction:column;align-items:center;cursor:pointer;gap:6px;">
      <div class="num" style="font-size:11px;color:${ok?"var(--accent)":"var(--warn)"}">${(r*100).toFixed(0)}</div>
      <div style="width:100%;max-width:34px;height:${h}%;border-radius:4px 4px 0 0;background:${ok?"var(--accent)":"var(--warn)"};opacity:${k===sel?1:.45}"></div>
      <div style="font-size:11px;color:var(--muted)">${MONTHS[+k.slice(5)-1]}</div></div>`;
  }).join("");
  document.getElementById("rolling").innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:baseline;">
      <div class="lbl">Monthly ratio · YTD</div>
      <div class="num" style="font-size:14px;color:${ytd>=TARGET?"var(--accent)":"var(--warn)"}">YTD ${(ytd*100).toFixed(1)}%</div>
    </div>
    <div style="display:flex;align-items:flex-end;gap:10px;height:120px;margin-top:18px;position:relative;">
      <div style="position:absolute;left:0;right:0;bottom:${(TARGET/max)*100}%;border-top:1px dashed rgba(255,255,255,0.28);">
        <span class="num" style="position:absolute;right:0;top:-14px;font-size:10px;color:var(--muted)">50%</span></div>
      ${bars||'<span style="color:var(--muted);font-size:13px;">no data yet</span>'}
    </div>`;
}
function segBtn(date,type,cur){
  const on=cur===type?`on-${type}`:"";
  const lab=type.charAt(0).toUpperCase()+type.slice(1);
  return `<button class="${on}" data-set="${type}" data-date="${date}">${lab}</button>`;
}
function renderDays(){
  document.getElementById("logtitle").textContent="Days · "+MONTHS[+sel.slice(5)-1]+" "+sel.slice(0,4);
  const [y,m]=sel.split("-").map(Number);
  const last=new Date(y,m,0).getDate();
  const hol=holidays(y);
  let html="";
  for(let dd=1;dd<=last;dd++){
    const dt=new Date(y,m-1,dd),dow=dt.getDay();
    if(dow===0||dow===6)continue;
    const date=iso(y,m,dd),stored=getDay(date),holName=hol[date];
    const type=stored?stored.type:(holName?"off":"unset");
    const showHours=type==="home"||type==="office";
    const mins=stored&&stored.minutes?stored.minutes:0;
    const ot=mins-REQ;
    html+=`<div class="day ${holName?"hol":""}">
      <div class="daydate num">${dd}.${pad(m)}<small>${WD[dow]}</small></div>
      <div class="seg">${segBtn(date,"home",type)}${segBtn(date,"office",type)}${segBtn(date,"off",type)}</div>
      ${showHours?`
        <input class="inp num" data-edit="min" data-date="${date}" value="${fmt(mins)}" style="width:74px;${mins<REQ||mins>MAXW?"color:var(--amber)":""}">
        <span class="num" style="font-size:13px;color:${ot<0?"var(--warn)":"var(--muted)"};width:64px;">OT ${fmt(ot)}</span>
        <input class="inp" data-edit="note" data-date="${date}" value="${esc(stored?stored.note:"")}" placeholder="note" style="flex:1;min-width:80px;background:transparent;border:none;color:var(--muted);">
      `:`<span style="flex:1;min-width:80px;color:var(--muted);font-size:14px;">${holName?`<span class="holbadge">${holName} · bank holiday</span>`:(type==="off"?"off":"—")}</span>`}
    </div>`;
  }
  document.getElementById("loglist").innerHTML=html;
}

// calculator
function calc(){
  const e=parseHM(document.getElementById("calcIn").value),pres=w=>w+(w>BRK_TH?BREAK:0),win=document.getElementById("calcWin");
  if(e==null)win.textContent="—";
  else win.innerHTML=`<span style="color:var(--muted)">min </span><span style="color:var(--text)">${fmt(e+pres(REQ))}</span><span style="color:var(--muted)"> → max </span><span style="color:var(--text)">${fmt(e+pres(MAXW))}</span>`;
  const l=parseHM(document.getElementById("calcOut").value),out=document.getElementById("calcWork");
  if(e!=null&&l!=null&&l>e){
    const span=l-e,work=span-(span>BRK_TH+BREAK?BREAK:0),ok=work>=REQ&&work<=MAXW,ot=work-REQ;
    out.innerHTML=`<span style="color:${ok?"var(--accent)":"var(--warn)"}">${fmt(work)}</span> <span style="font-size:13px;color:var(--muted)">· OT ${fmt(ot)}</span>${ok?"":' <span style="font-size:12px;color:var(--warn)">'+(work<REQ?"< min":"> max")+'</span>'}`;
  }else out.textContent="—";
}

// events
document.addEventListener("click",e=>{
  const t=e.target;
  if(t.dataset.month){sel=t.dataset.month;render();}
  if(t.id==="prev"){sel=shiftMonth(sel,-1);render();}
  if(t.id==="next"){sel=shiftMonth(sel,1);render();}
  if(t.dataset.set){
    const cur=getDay(t.dataset.date);
    if(cur&&cur.type===t.dataset.set){setDay(t.dataset.date,{type:"unset"});} // tap active to clear
    else setDay(t.dataset.date,{type:t.dataset.set});
  }
  if(t.id==="export"){const a=document.getElementById("dl");a.href=URL.createObjectURL(new Blob([JSON.stringify(days,null,2)],{type:"application/json"}));a.download="office-ratio-backup.json";a.click();}
  if(t.id==="importBtn")document.getElementById("importFile").click();
  if(t.id==="reset"){if(confirm("Reset to the imported Excel data? Current entries will be lost.")){days=SEED.slice();save();render();}}
});
document.addEventListener("focusout",e=>{
  const t=e.target;if(!t.dataset||!t.dataset.edit)return;
  const d=getDay(t.dataset.date);if(!d)return;
  if(t.dataset.edit==="min"){const v=parseHM(t.value);if(v!=null)d.minutes=v;}else d.note=t.value;
  save();render();
});
document.getElementById("importFile").addEventListener("change",e=>{
  const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{try{const arr=JSON.parse(r.result);if(Array.isArray(arr)){days=arr;save();render();}}catch(err){alert("Could not read that backup file.");}};
  r.readAsText(f);
});
["calcIn","calcOut"].forEach(id=>document.getElementById(id).addEventListener("input",calc));

function installPWA(){
  try{
    const cv=document.createElement("canvas");cv.width=cv.height=512;const c=cv.getContext("2d");
    c.fillStyle="#0a0b0d";c.fillRect(0,0,512,512);
