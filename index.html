<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ratio">
<meta name="theme-color" content="#0a0b0d">
<title>Mad Max: Fury Desk</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap');
:root{
  --bg:#0a0b0d; --panel:#13161c; --line:rgba(255,255,255,0.09); --line2:rgba(255,255,255,0.2);
  --text:#edebe4; --muted:#9aa0ac; --accent:#c6f24e; --warn:#ff6a55; --amber:#f5b54a; --off:#7e8aa8;
  --lockbg:rgba(126,138,168,0.08); --font:'IBM Plex Sans',system-ui,sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font);font-size:16px;line-height:1.5;-webkit-text-size-adjust:100%;}
body{padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);}
.num{font-variant-numeric:tabular-nums lining-nums;}
.wrap{max-width:980px;margin:0 auto;padding:26px 14px 90px;}
button{font-family:var(--font);cursor:pointer;}
input,select{font-family:var(--font);font-size:15px;}
input[type=time],input[type=date],select{color-scheme:dark;}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;}
.lbl{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:600;}
.sub{font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;font-weight:600;}
.inp,select.inp{font-size:15px;padding:7px 9px;border-radius:8px;border:1px solid var(--line);background:rgba(255,255,255,0.04);color:var(--text);outline:none;}
header{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:18px;}
h1{font-size:28px;font-weight:700;margin:2px 0 0;letter-spacing:-.01em;}
.kicker{font-size:12px;letter-spacing:.18em;color:var(--accent);text-transform:uppercase;font-weight:600;}
.navbtn{font-size:18px;background:none;border:1px solid var(--line);border-radius:9px;color:var(--muted);width:38px;height:38px;line-height:1;}
.chips{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-top:14px;}
.chip{font-size:13px;padding:8px 0;border-radius:9px;border:1px solid var(--line);background:transparent;color:var(--muted);text-align:center;font-weight:500;}
.chip.has{color:var(--text);}
.chip.on{border-color:var(--accent);background:var(--accent);color:#0a0b0d;font-weight:700;}
.grid2{display:grid;grid-template-columns:1fr;gap:16px;}
@media(min-width:760px){.grid2{grid-template-columns:1fr 1fr;}}
.pa{display:flex;gap:22px;flex-wrap:wrap;}
.bar{position:absolute;inset:0;opacity:.85;transition:width .4s;}
.ghost{background:none;border:1px solid var(--line);border-radius:8px;color:var(--muted);font-size:13px;padding:7px 12px;}
.ghost:hover{color:var(--text);}
.hidden{display:none;}
.btn{border:none;border-radius:9px;font-weight:600;font-size:14px;padding:9px 16px;background:var(--accent);color:#0a0b0d;}
.selwrap{display:inline-flex;align-items:center;gap:3px;}
.selwrap select{padding:6px 7px;border-radius:7px;border:1px solid var(--line2);background:#1e232c;color:var(--text);font-size:14px;font-weight:600;}
.selwrap select:disabled{opacity:.6;}
.seg{display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:nowrap;}
.seg .segtog{flex:0 0 auto;min-width:58px;border:1px solid var(--line);border-radius:8px;font-weight:600;font-size:13px;padding:7px 4px;background:rgba(255,255,255,.04);color:var(--text);text-align:center;}
.seg .segtog.office{border-color:var(--accent);background:rgba(198,242,78,.14);color:var(--accent);}
.seg input[type=time]{flex:1 1 0;min-width:0;width:auto;font-size:14px;padding:6px 4px;border-radius:8px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--text);}
.seg .x{flex:0 0 auto;background:none;border:none;color:var(--muted);font-size:15px;padding:0 2px;}
.seg .arr{flex:0 0 auto;color:var(--muted);font-size:13px;}
/* day table */
.dayhead{display:flex;align-items:center;gap:7px;padding:2px 8px 8px;font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-weight:600;border-bottom:1px solid var(--line);margin-bottom:4px;}
.day{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:9px;border-left:3px solid transparent;}
.day:hover{background:rgba(255,255,255,0.025);}
.day.hol{background:rgba(126,138,168,.10);}
.day.needs{border-left-color:var(--amber);}
.day.locked{background:var(--lockbg);border-left-color:var(--off);}
.day.split{flex-wrap:wrap;}
.day.wkstart{margin-top:14px;padding-top:14px;position:relative;}
.day.wkstart::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);opacity:.85;border-radius:2px;}
.dd{width:54px;flex:0 0 auto;font-weight:600;font-size:14px;line-height:1.15;}
.dd small{display:block;font-weight:400;color:var(--muted);font-size:11px;}
.cyc{flex:0 0 auto;width:66px;border-radius:8px;border:1px solid var(--line);font-weight:600;font-size:13px;padding:7px 0;background:transparent;color:var(--muted);text-align:center;}
.cyc.home{border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.12);color:var(--text);}
.cyc.office{border-color:var(--accent);background:rgba(198,242,78,.16);color:var(--accent);}
.cyc.off{border-color:var(--off);background:rgba(126,138,168,.2);color:#bcc6dd;}
.cyc.splitc{border-color:var(--amber);background:rgba(245,181,74,.16);color:var(--amber);}
.cyc:disabled{opacity:.65;}
.dot{flex:0 0 auto;width:54px;font-size:13px;text-align:center;}
.dbreak{flex:1 1 auto;min-width:50px;font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dbreak.full{flex-basis:100%;white-space:normal;margin-top:4px;padding-left:2px;}
.iconb{flex:0 0 auto;background:none;border:none;font-size:15px;line-height:1;padding:3px 4px;color:var(--muted);}
.iconb.lk{margin-left:auto;}
.holtag{color:#bcc6dd;}
.needtag{color:var(--amber);}
.histgrid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-top:14px;}
.hcell{border:1px solid var(--line);border-radius:9px;padding:8px 4px;text-align:center;}
.hcell .m{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}
.hcell .p{font-size:16px;font-weight:700;margin-top:2px;}
.qrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
.qcell{flex:1;min-width:70px;border:1px solid var(--line);border-radius:9px;padding:9px 6px;text-align:center;}
.qcell .m{font-size:11px;color:var(--muted);text-transform:uppercase;}
.qcell .p{font-size:17px;font-weight:700;margin-top:2px;}
.qcell.ytd{border-color:var(--accent);}
.dow{display:flex;align-items:flex-end;gap:10px;height:140px;margin-top:16px;}
.dowcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end;}
.dowcol .pct{font-size:12px;font-weight:700;}
.stack{width:100%;max-width:42px;border-radius:5px 5px 0 0;overflow:hidden;display:flex;flex-direction:column;min-height:2px;}
.stack .segO{background:var(--accent);}
.stack .segH{background:var(--off);}
.dowcol .d{font-size:11px;color:var(--muted);text-transform:uppercase;}
.dowcol .cnt{font-size:10px;color:var(--muted);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="kicker">Presence Tracker</div>
      <h1>Mad&nbsp;Max: Fury&nbsp;Desk</h1>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <button class="navbtn" id="prev">‹</button>
      <div id="monthlabel" class="num" style="min-width:104px;text-align:center;font-size:15px;font-weight:600;"></div>
      <button class="navbtn" id="next">›</button>
    </div>
  </header>
  <div id="chips" class="chips"></div>

  <div id="status" class="panel" style="padding:22px;margin:16px 0;"></div>

  <div class="grid2">
    <div class="panel" style="padding:20px 22px;">
      <div class="lbl">Daily exit calculator</div>
      <div style="display:flex;gap:18px;margin-top:14px;flex-wrap:wrap;">
        <div>
          <div class="sub">clock in</div>
          <span class="selwrap"><select id="ciH"></select><span style="color:var(--muted)">:</span><select id="ciM"></select></span>
        </div>
        <div style="flex:1;min-width:140px;">
          <div class="sub">leave window</div>
          <div id="calcWin" class="num" style="font-size:15px;margin-top:7px;line-height:1.6;color:var(--muted);">—</div>
        </div>
      </div>
      <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--line);display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end;">
        <div>
          <div class="sub">if I leave at</div>
          <span class="selwrap"><select id="coH"></select><span style="color:var(--muted)">:</span><select id="coM"></select></span>
        </div>
        <div>
          <div class="sub">work / overtime</div>
          <div id="calcWork" class="num" style="font-size:17px;margin-top:4px;color:var(--muted);">—</div>
        </div>
      </div>
      <div style="font-size:12px;color:var(--muted);margin-top:12px;">30-min break auto-deducted when over 6h.</div>
    </div>

    <div class="panel" style="padding:20px 22px;">
      <div class="lbl">Commit actual day</div>
      <div style="margin-top:12px;">
        <div class="sub">date</div>
        <input type="date" id="cmDate" class="inp" style="width:160px;">
      </div>
      <div id="segs" style="margin-top:8px;"></div>
      <div style="display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;">
        <button class="ghost" id="addSeg">+ add segment</button>
        <button class="btn" id="cmCommit">Commit day</button>
      </div>
      <div id="cmMsg" style="font-size:12px;color:var(--muted);margin-top:10px;"></div>
    </div>
  </div>

  <div class="panel" style="padding:20px 22px;margin-top:16px;">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
      <div class="lbl" id="logtitle">Days</div>
      <button class="ghost" id="lockMonth"></button>
    </div>
    <div class="dayhead">
      <span style="width:26px"></span>
      <span style="width:54px;text-align:center">Date</span>
      <span style="width:66px;text-align:center">State</span>
      <span style="flex:1 1 auto;text-align:center">Hours</span>
      <span style="width:54px;text-align:center">OT</span>
    </div>
    <div id="loglist" style="display:flex;flex-direction:column;gap:1px;"></div>
  </div>

  <div id="hist" class="panel" style="padding:20px 22px;margin-top:16px;"></div>

  <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:16px;flex-wrap:wrap;">
    <button class="ghost" id="export">export backup</button>
    <button class="ghost" id="importBtn">import backup</button>
    <button class="ghost" id="reset">reset (clear all)</button>
    <input type="file" id="importFile" accept="application/json" class="hidden">
    <a id="dl" class="hidden"></a>
  </div>
</div>

<script>
const REQ=462, MAXW=600, BREAK=30, BRK_TH=360, TARGET=0.5, OT_TARGET=1500, KEY='presence_days_v3';
const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const WD=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const CYCLE=["unset","home","office","off"];
const SEED=[];

const pad=n=>String(n).padStart(2,"0");
const fmt=m=>{const s=m<0?"-":"";m=Math.abs(Math.round(m));return s+Math.floor(m/60)+":"+pad(m%60);};
const parseHM=s=>{if(s==null||s==="")return null;s=String(s).trim();if(s.includes(":")){const[h,mm]=s.split(":");const H=parseInt(h,10),M=parseInt(mm||"0",10);if(isNaN(H)||isNaN(M))return null;return H*60+M;}const f=parseFloat(s);return isNaN(f)?null:Math.round(f*60);};
const mk=d=>d.slice(0,7);
const iso=(y,m,d)=>y+"-"+pad(m)+"-"+pad(d);
const todayISO=()=>{const t=new Date();return iso(t.getFullYear(),t.getMonth()+1,t.getDate());};

function easter(y){
  const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),
  g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,
  mo=Math.floor((a+11*h+22*l)/451),mon=Math.floor((h+l-7*mo+114)/31),day=((h+l-7*mo+114)%31)+1;
  return new Date(y,mon-1,day);
}
function addDays(dt,n){const x=new Date(dt);x.setDate(x.getDate()+n);return x;}
function holidays(y){
  const H={};
  [[1,1,"New Year's Day"],[1,6,"Epiphany"],[5,1,"Labour Day"],[8,15,"Assumption Day"],
   [10,26,"National Day"],[11,1,"All Saints' Day"],[12,8,"Immaculate Conception"],[12,25,"Christmas Day"],[12,26,"St. Stephen's Day"]]
   .forEach(([m,d,n])=>H[iso(y,m,d)]=n);
  const e=easter(y);
  [[1,"Easter Monday"],[39,"Ascension Day"],[50,"Whit Monday"],[60,"Corpus Christi"]]
   .forEach(([o,n])=>{const dt=addDays(e,o);H[iso(dt.getFullYear(),dt.getMonth()+1,dt.getDate())]=n;});
  return H;
}

function segDur(s){const a=parseHM(s.start),b=parseHM(s.end);if(a==null||b==null)return 0;let d=b-a;if(d<0)d+=1440;return d;}
function computeSegs(segs){
  const sorted=[...segs].filter(s=>segDur(s)>0).sort((a,b)=>parseHM(a.start)-parseHM(b.start));
  let gross=0,officeG=0,homeG=0;
  sorted.forEach(s=>{const du=segDur(s);gross+=du;if(s.loc==="office")officeG+=du;else homeG+=du;});
  let gaps=0;for(let i=1;i<sorted.length;i++){let g=parseHM(sorted[i].start)-parseHM(sorted[i-1].end);if(g<0)g+=1440;if(g>0)gaps+=g;}
  const brk=gross>BRK_TH?Math.max(0,BREAK-gaps):0;
  const net=gross-brk,f=gross>0?net/gross:0;
  const officeNet=Math.round(officeG*f),homeNet=net-officeNet;
  return{gross,officeG,homeG,gaps,brk,net,officeNet,homeNet};
}

let days, sel;
function load(){try{const r=localStorage.getItem(KEY);days=r?JSON.parse(r):SEED.slice();}catch(e){days=SEED.slice();}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(days));}catch(e){}}
function migrate(){
  let changed=false;
  days=days.map(d=>{
    if(d&&d.segments&&d.segments.length){
      changed=true;const c=computeSegs(d.segments);
      if(c.officeNet>0&&c.homeNet>0)return{date:d.date,split:true,office:c.officeNet,home:c.homeNet,brk:c.brk,locked:!!d.locked};
      return{date:d.date,type:c.officeG>0?"office":"home",minutes:c.net,locked:!!d.locked};
    }
    return d;
  });
  if(changed)save();
}
function getDay(date){return days.find(x=>x.date===date);}
function removeDay(date){days=days.filter(x=>x.date!==date);}

function metrics(d){
  if(!d)return null;
  if(d.type==="off")return{off:true,office:0,home:0,total:0,ot:0};
  if(d.split)return{off:false,multi:true,office:d.office||0,home:d.home||0,total:(d.office||0)+(d.home||0),ot:(d.office||0)+(d.home||0)-REQ,brk:d.brk||0};
  if(d.type==="office")return{off:false,office:d.minutes||0,home:0,total:d.minutes||0,ot:(d.minutes||0)-REQ};
  if(d.type==="home")return{off:false,office:0,home:d.minutes||0,total:d.minutes||0,ot:(d.minutes||0)-REQ};
  return null;
}
function agg(k,lockedOnly){
  let office=0,home=0,off=0,ot=0,work=0;
  for(const d of days){
    if(mk(d.date)!==k)continue;
    if(lockedOnly&&!d.locked)continue;
    const m=metrics(d);if(!m)continue;
    if(m.off){off++;continue;}
    office+=m.office;home+=m.home;ot+=m.ot;work++;
  }
  const total=office+home;
  return{office,home,off,total,ot,work,ratio:total?office/total:0};
}
function aggMonths(months,lockedOnly){let o=0,t=0;for(const k of months){const a=agg(k,lockedOnly);o+=a.office;t+=a.total;}return t?o/t:null;}
function shiftMonth(k,delta){let[y,m]=k.split("-").map(Number);m+=delta;while(m<1){m+=12;y--;}while(m>12){m-=12;y++;}return y+"-"+pad(m);}

function render(){
  document.getElementById("monthlabel").textContent=MONTHS[+sel.slice(5)-1]+" "+sel.slice(0,4);
  renderChips();renderStatus();renderDays();renderHist();renderLockBtn();
}
function renderChips(){
  const y=sel.slice(0,4);
  document.getElementById("chips").innerHTML=MONTHS.map((nm,i)=>{
    const k=y+"-"+pad(i+1),on=k===sel,has=agg(k,false).total>0;
    return `<button class="chip ${on?"on":""} ${has?"has":""}" data-month="${k}">${nm}</button>`;
  }).join("");
}
function paBlock(title,plan,act,unit){
  const a=act==null?'<span style="color:var(--muted)">—</span>':unit==="pct"?(act*100).toFixed(1)+'%':fmt(act);
  const p=unit==="pct"?(plan*100).toFixed(1)+'%':fmt(plan);
  return `<div><div class="lbl">${title}</div>
    <div class="pa" style="margin-top:8px;">
      <div><div class="sub" style="margin:0">planned</div><div class="num" style="font-size:32px;font-weight:700;color:var(--accent)">${p}</div></div>
      <div><div class="sub" style="margin:0">actual</div><div class="num" style="font-size:32px;font-weight:700;color:var(--text)">${a}</div></div>
    </div></div>`;
}
function renderStatus(){
  const P=agg(sel,false),A=agg(sel,true),hasActual=A.work>0,over=P.ratio>=TARGET;
  document.getElementById("status").innerHTML=`
    <div style="display:grid;grid-template-columns:1fr;gap:20px;">
      ${paBlock("Office presence",P.ratio,hasActual?A.ratio:null,"pct")}
      ${paBlock("Overtime",P.ot,hasActual?A.ot:null,"time")}
    </div>
    <div style="margin-top:18px;position:relative;height:14px;border-radius:7px;background:rgba(255,255,255,0.06);overflow:hidden;">
      <div class="bar" style="width:${Math.min(P.ratio*100,100)}%;background:${over?"var(--accent)":"var(--warn)"}"></div>
    </div>
    <div style="position:relative;height:0;"><div class="num" style="position:absolute;left:50%;top:-15px;transform:translateX(-50%);font-size:11px;color:var(--muted)">50% line</div></div>
    <div class="num" style="margin-top:22px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;font-size:14px;color:var(--muted)">
      <span>office <b style="color:var(--text)">${fmt(P.office)}</b></span>
      <span>home <b style="color:var(--text)">${fmt(P.home)}</b></span>
      <span>off <b style="color:var(--text)">${P.off}d</b></span>
      <span>total <b style="color:var(--text)">${fmt(P.total)}</b></span>
    </div>`;
}
function hourSel(val,date,disabled){let o="";for(let h=0;h<=12;h++)o+=`<option value="${h}" ${h===val?"selected":""}>${h}</option>`;return `<select class="hsel" data-h="${date}" ${disabled?"disabled":""}>${o}</select>`;}
function minSel(val,date,disabled){let o="";for(let m=0;m<60;m++)o+=`<option value="${m}" ${m===val?"selected":""}>${pad(m)}</option>`;return `<select class="msel" data-m="${date}" ${disabled?"disabled":""}>${o}</select>`;}

function renderDays(){
  document.getElementById("logtitle").textContent="Days · "+MONTHS[+sel.slice(5)-1]+" "+sel.slice(0,4);
  const [y,m]=sel.split("-").map(Number),last=new Date(y,m,0).getDate(),hol=holidays(y),tdy=todayISO();
  let html="",firstDone=false;
  for(let dd=1;dd<=last;dd++){
    const dt=new Date(y,m-1,dd),dow=dt.getDay();
    if(dow===0||dow===6)continue;
    const date=iso(y,m,dd),stored=getDay(date),holName=hol[date],locked=stored&&stored.locked;
    const mm=metrics(stored),type=stored?stored.type:"unset";
    const needs=!stored&&!holName&&date<tdy;
    const wkstart=(dow===1&&firstDone);firstDone=true;
    const ddHtml=`<div class="dd num">${pad(dd)}.${pad(m)}<small>${WD[dow]}</small></div>`;
    const lockIcon=`<button class="iconb lk" data-lock="${date}" title="${locked?"locked":"unlocked"}">${locked?"🔒":"🔓"}</button>`;
    let row;
    if(stored&&stored.split){
      const brkTxt=mm.brk?` · −${fmt(mm.brk)} break`:"";
      const clearBtn=locked?"":`<button class="iconb" data-clear="${date}">✕</button>`;
      row=`<div class="day split ${locked?"locked":""} ${wkstart?"wkstart":""}">${lockIcon}${ddHtml}
        <span class="cyc splitc" style="cursor:default">Split</span>
        ${clearBtn}
        <span class="dbreak full">Office ${fmt(mm.office)} · Home ${fmt(mm.home)}${brkTxt} → total <b style="color:${mm.ot<0?"var(--warn)":"var(--text)"}">${fmt(mm.total)}</b> · OT ${fmt(mm.ot)}</span></div>`;
    }else if(type==="home"||type==="office"){
      const mins=stored.minutes||0,h=Math.floor(mins/60),mn=mins%60,ot=mins-REQ;
      row=`<div class="day ${locked?"locked":""} ${wkstart?"wkstart":""}">${lockIcon}${ddHtml}
        <button class="cyc ${type}" data-cycle="${date}" ${locked?"disabled":""}>${type.charAt(0).toUpperCase()+type.slice(1)}</button>
        <span class="selwrap">${hourSel(h,date,locked)}<span style="color:var(--muted)">:</span>${minSel(mn,date,locked)}</span>
        <span class="dot num" style="color:${ot<0?"var(--warn)":"var(--muted)"}">${fmt(ot)}</span></div>`;
    }else{
      const msg=holName?`<span class="holtag">${holName} · bank holiday</span>`:needs?`<span class="needtag">⚠ not logged yet</span>`:(type==="off"?"off":"");
      row=`<div class="day ${holName?"hol":""} ${needs?"needs":""} ${locked?"locked":""} ${wkstart?"wkstart":""}">${lockIcon}${ddHtml}
        <button class="cyc ${type==="off"?"off":""}" data-cycle="${date}" ${locked?"disabled":""}>${type==="off"?"Off":"—"}</button>
        <span class="dbreak">${msg}</span></div>`;
    }
    html+=row;
  }
  document.getElementById("loglist").innerHTML=html;
}
function renderHist(){
  const y=sel.slice(0,4);
  const cells=MONTHS.map((nm,i)=>{
    const a=agg(y+"-"+pad(i+1),true),has=a.work>0;
    return `<div class="hcell"><div class="m">${nm}</div><div class="p num" style="color:${has?(a.ratio>=TARGET?"var(--accent)":"var(--warn)"):"var(--muted)"}">${has?(a.ratio*100).toFixed(0)+"%":"–"}</div></div>`;
  }).join("");
  const q=[];
  for(let qi=0;qi<4;qi++){
    const r=aggMonths([0,1,2].map(j=>y+"-"+pad(qi*3+j+1)),true);
    q.push(`<div class="qcell"><div class="m">Q${qi+1}</div><div class="p num" style="color:${r==null?"var(--muted)":r>=TARGET?"var(--accent)":"var(--warn)"}">${r==null?"–":(r*100).toFixed(1)+"%"}</div></div>`);
  }
  const ytd=aggMonths(MONTHS.map((_,i)=>y+"-"+pad(i+1)),true);
  q.push(`<div class="qcell ytd"><div class="m">YTD</div><div class="p num" style="color:${ytd==null?"var(--muted)":ytd>=TARGET?"var(--accent)":"var(--warn)"}">${ytd==null?"–":(ytd*100).toFixed(1)+"%"}</div></div>`);
  // weekday office vs home day-count distribution (Mon–Fri), locked days, current year
  const dowOff=[0,0,0,0,0],dowHome=[0,0,0,0,0];
  for(const d of days){
    if(d.date.slice(0,4)!==y||!d.locked)continue;
    const m=metrics(d);if(!m||m.off)continue;
    const wd=new Date(d.date+"T00:00:00").getDay();
    if(wd<1||wd>5)continue;
    // a split day counts toward both; otherwise whichever location it was
    if(m.office>0)dowOff[wd-1]+=1;
    if(m.home>0)dowHome[wd-1]+=1;
  }
  const dowLabels=["Mon","Tue","Wed","Thu","Fri"];
  const maxTot=Math.max(1,...dowLabels.map((_,i)=>dowOff[i]+dowHome[i]));
  const anyData=dowOff.concat(dowHome).some(v=>v>0);
  const dist=dowLabels.map((lab,i)=>{
    const tot=dowOff[i]+dowHome[i];
    const offShare=tot?(dowOff[i]/tot*100):0;
    const colH=(tot/maxTot)*100;
    const officePct=tot?Math.round(dowOff[i]/tot*100):0;
    return `<div class="dowcol">
      <div class="pct" style="color:${dowOff[i]?"var(--accent)":"var(--muted)"}">${tot?officePct+"%":"–"}</div>
      <div class="stack" style="height:${colH}%;">
        <div class="segO" style="height:${offShare}%"></div>
        <div class="segH" style="height:${100-offShare}%"></div>
      </div>
      <div class="d">${lab}</div><div class="cnt">${dowOff[i]}🏢 ${dowHome[i]}🏠</div></div>`;
  }).join("");
  const distBlock=`<div class="lbl" style="margin-top:24px;">Which days I go to the office · ${y}</div>
    <div class="sub" style="margin-top:4px;font-weight:400;">office vs home split per weekday · % = office${anyData?"":" · lock days to populate"}</div>
    <div class="dow">${dist}</div>
    <div style="display:flex;gap:16px;margin-top:10px;font-size:12px;color:var(--muted);">
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--accent);vertical-align:middle;margin-right:5px;"></span>office</span>
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--off);vertical-align:middle;margin-right:5px;"></span>home</span>
    </div>`;
  document.getElementById("hist").innerHTML=`<div class="lbl">Historical office presence · ${y}</div><div class="histgrid">${cells}</div><div class="qrow">${q.join("")}</div>${distBlock}`;
}
function renderLockBtn(){
  const ds=days.filter(d=>mk(d.date)===sel&&metrics(d));
  const anyUnlocked=ds.some(d=>!d.locked);
  const b=document.getElementById("lockMonth");
  b.innerHTML=anyUnlocked?"🔓 lock month":"🔒 unlock month";b.dataset.action=anyUnlocked?"lock":"unlock";
}

let segState=[];
function renderSegs(){
  document.getElementById("segs").innerHTML=segState.map((s,i)=>`
    <div class="seg">
      <button class="segtog ${s.loc==="office"?"office":""}" data-segloc="${i}">${s.loc==="office"?"Office":"Home"}</button>
      <input type="time" step="60" data-segstart="${i}" value="${s.start}">
      <span class="arr">→</span>
      <input type="time" step="60" data-segend="${i}" value="${s.end}">
      <button class="x" data-segdel="${i}">✕</button>
    </div>`).join("");
}
function addSegment(loc){segState.push({loc:loc||"office",start:"",end:""});renderSegs();}

function fillSel(id,max,def,blank){let o=blank?'<option value="">--</option>':'';for(let i=0;i<=max;i++)o+=`<option value="${i}" ${i===def?"selected":""}>${pad(i)}</option>`;document.getElementById(id).innerHTML=o;}
function clockVal(hId,mId){const h=document.getElementById(hId).value,m=document.getElementById(mId).value;if(h===""||m==="")return null;return(+h)*60+(+m);}
function calc(){
  const e=clockVal("ciH","ciM"),pres=w=>w+(w>BRK_TH?BREAK:0),win=document.getElementById("calcWin");
  if(e==null)win.textContent="—";
  else win.innerHTML=`<span style="color:var(--muted)">min </span><span style="color:var(--text)">${fmt(e+pres(REQ))}</span><span style="color:var(--muted)"> → max </span><span style="color:var(--text)">${fmt(e+pres(MAXW))}</span>`;
  const l=clockVal("coH","coM"),out=document.getElementById("calcWork");
  if(e!=null&&l!=null&&l>e){
    const span=l-e,work=span-(span>BRK_TH?BREAK:0),ok=work>=REQ&&work<=MAXW,ot=work-REQ;
    out.innerHTML=`<span style="color:${ok?"var(--accent)":"var(--warn)"}">${fmt(work)}</span> <span style="font-size:13px;color:var(--muted)">· OT ${fmt(ot)}</span>${ok?"":' <span style="font-size:12px;color:var(--warn)">'+(work<REQ?"< min":"> max")+'</span>'}`;
  }else out.textContent="—";
}

document.addEventListener("click",e=>{
  const t=e.target;
  if(t.dataset.month){sel=t.dataset.month;render();}
  if(t.id==="prev"){sel=shiftMonth(sel,-1);render();}
  if(t.id==="next"){sel=shiftMonth(sel,1);render();}
  if(t.dataset.cycle){
    const d=getDay(t.dataset.cycle);if(d&&d.locked)return;
    const cur=d?d.type:"unset",nx=CYCLE[(CYCLE.indexOf(cur)+1)%CYCLE.length];
    if(nx==="unset"){removeDay(t.dataset.cycle);}
    else if(!d){days.push({date:t.dataset.cycle,type:nx,minutes:REQ});}
    else{d.type=nx;if((nx==="home"||nx==="office")&&!d.minutes)d.minutes=REQ;}
    save();render();
  }
  if(t.dataset.clear){const d=getDay(t.dataset.clear);if(d&&!d.locked){removeDay(t.dataset.clear);save();render();}}
  if(t.dataset.lock){const d=getDay(t.dataset.lock);if(d){d.locked=!d.locked;save();render();}}
  if(t.id==="lockMonth"){const lock=t.dataset.action==="lock";days.forEach(d=>{if(mk(d.date)===sel&&metrics(d))d.locked=lock;});save();render();}
  if(t.dataset.segloc!=null){const i=+t.dataset.segloc;segState[i].loc=segState[i].loc==="office"?"home":"office";renderSegs();}
  if(t.dataset.segdel!=null){segState.splice(+t.dataset.segdel,1);renderSegs();}
  if(t.id==="addSeg")addSegment(segState.length?segState[segState.length-1].loc:"office");
  if(t.id==="cmCommit"){
    const date=document.getElementById("cmDate").value,msg=document.getElementById("cmMsg");
    if(!date){msg.textContent="Pick a date.";msg.style.color="var(--warn)";return;}
    const ex=getDay(date);if(ex&&ex.locked){msg.textContent="That day is locked — unlock it first.";msg.style.color="var(--warn)";return;}
    const segs=segState.filter(s=>s.start&&s.end&&segDur(s)>0);
    if(!segs.length){msg.textContent="Add at least one segment with start and end times.";msg.style.color="var(--warn)";return;}
    const c=computeSegs(segs);
    removeDay(date);
    if(c.officeNet>0&&c.homeNet>0)days.push({date,split:true,office:c.officeNet,home:c.homeNet,brk:c.brk,locked:false});
    else days.push({date,type:c.officeG>0?"office":"home",minutes:c.net,locked:false});
    save();sel=mk(date);
    msg.textContent="✓ Committed "+date+" · "+fmt(c.net)+" worked"+(c.brk?(" (−"+fmt(c.brk)+" break)"):"");msg.style.color="var(--accent)";
    segState=[];addSegment("office");render();
  }
  if(t.id==="export"){const a=document.getElementById("dl");a.href=URL.createObjectURL(new Blob([JSON.stringify(days,null,2)],{type:"application/json"}));a.download="office-ratio-backup.json";a.click();}
  if(t.id==="importBtn")document.getElementById("importFile").click();
  if(t.id==="reset"){if(confirm("Clear all entries? Export a backup first if unsure.")){days=[];save();render();}}
});
document.addEventListener("change",e=>{
  const t=e.target;
  if(t.id&&(t.id.startsWith("ci")||t.id.startsWith("co"))){t.blur();calc();return;}
  if(t.classList&&(t.classList.contains("hsel")||t.classList.contains("msel"))){
    const date=t.dataset.h||t.dataset.m,d=getDay(date);if(!d||d.locked)return;
    const wrap=t.closest(".selwrap"),hs=wrap.querySelector(".hsel"),ms=wrap.querySelector(".msel");
    d.minutes=(+hs.value)*60+(+ms.value);save();render();
  }
  if(t.dataset.segstart!=null)segState[+t.dataset.segstart].start=t.value;
  if(t.dataset.segend!=null)segState[+t.dataset.segend].end=t.value;
});
document.getElementById("importFile").addEventListener("change",e=>{
  const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{try{const arr=JSON.parse(r.result);if(Array.isArray(arr)){days=arr;migrate();save();render();}}catch(err){alert("Could not read that backup file.");}};
  r.readAsText(f);
});

function installPWA(){
  try{
    const cv=document.createElement("canvas");cv.width=cv.height=512;const c=cv.getContext("2d");
    c.fillStyle="#0a0b0d";c.fillRect(0,0,512,512);
    c.strokeStyle="#c6f24e";c.lineWidth=26;c.beginPath();c.arc(256,256,150,-Math.PI/2,Math.PI*0.55);c.stroke();
    c.fillStyle="#edebe4";c.font="700 150px sans-serif";c.textAlign="center";c.textBaseline="middle";c.fillText("50",256,250);
    c.fillStyle="#c6f24e";c.font="700 70px sans-serif";c.fillText("%",256,360);
    const icon=cv.toDataURL("image/png");
    const al=document.createElement("link");al.rel="apple-touch-icon";al.href=icon;document.head.appendChild(al);
    const man={name:"Office Ratio",short_name:"Ratio",display:"standalone",background_color:"#0a0b0d",theme_color:"#0a0b0d",start_url:".",icons:[{src:icon,sizes:"512x512",type:"image/png"},{src:icon,sizes:"192x192",type:"image/png"}]};
    const ml=document.createElement("link");ml.rel="manifest";ml.href=URL.createObjectURL(new Blob([JSON.stringify(man)],{type:"application/manifest+json"}));document.head.appendChild(ml);
  }catch(e){}
}

load();migrate();
sel=todayISO().slice(0,7);
document.getElementById("cmDate").value=todayISO();
fillSel("ciH",23,8,false);fillSel("ciM",59,30,false);fillSel("coH",23,null,true);fillSel("coM",59,null,true);
["ciH","ciM","coH","coM"].forEach(id=>document.getElementById(id).addEventListener("change",calc));
addSegment("office");
render();calc();installPWA();
</script>
